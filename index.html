<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sign Out Song</title><style>*{margin:0;padding:0;box-sizing:border-box}body{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a3a5c;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;color:#e0e0e0;overflow:hidden}.container{text-align:center;max-width:480px;width:90%;padding:48px 32px}h1{font-size:28px;font-weight:700;color:#ffffff;line-height:1.3;margin-bottom:12px}.subtitle{font-size:15px;color:#a0aab4;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:48px}.play-btn{width:100px;height:100px;border-radius:50%;background:#4a5568;border:3px solid #d4a017;box-shadow:0 0 20px rgba(212,160,23,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;transition:all .2s ease}.play-btn:hover{background:#5a6578;box-shadow:0 0 30px rgba(212,160,23,0.45);transform:scale(1.05)}.play-btn:active{transform:scale(.96)}.play-btn svg{width:40px;height:40px;fill:#ffffff;margin-left:5px}.play-btn.playing svg{margin-left:0}.progress-wrap{width:100%;height:4px;background:#2d4a66;border-radius:2px;margin-bottom:10px;cursor:pointer;overflow:hidden}.progress-bar{height:100%;background:linear-gradient(90deg,#d4a017,#f0c040);width:0%;border-radius:2px;transition:width .1s linear}.time{font-size:11px;color:#6b7f8e;font-family:'Courier New',monospace;display:flex;justify-content:space-between}</style></head><body><div class="container"><h1>Are you in a good place<br>for sign out?</h1><div class="subtitle">Sign Out Song</div><button class="play-btn" id="playBtn" onclick="togglePlay()"><svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></button><div class="progress-wrap" onclick="seek(event)"><div class="progress-bar" id="progressBar"></div></div><div class="time"><span id="currentTime">0:00</span><span id="duration">0:00</span></div></div><audio id="audio" src="sign-out-song.mp3" preload="auto"></audio><script>const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),playIcon=document.getElementById('playIcon'),progressBar=document.getElementById('progressBar'),currentTimeEl=document.getElementById('currentTime'),durationEl=document.getElementById('duration');const playSVG='<polygon points="6,3 20,12 6,21"/>',pauseSVG='<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';function fmt(s){if(isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}function togglePlay(){if(audio.paused){audio.play();playIcon.innerHTML=pauseSVG;playBtn.classList.add('playing')}else{audio.pause();playIcon.innerHTML=playSVG;playBtn.classList.remove('playing')}}audio.addEventListener('timeupdate',()=>{progressBar.style.width=(audio.currentTime/audio.duration)*100+'%';currentTimeEl.textContent=fmt(audio.currentTime)});audio.addEventListener('loadedmetadata',()=>{durationEl.textContent=fmt(audio.duration)});audio.addEventListener('ended',()=>{playIcon.innerHTML=playSVG;playBtn.classList.remove('playing');progressBar.style.width='0%'});function seek(e){const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration}</script></body></html>
