<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Out Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;background:#d4d0c8;font-family:Tahoma,'MS Sans Serif',Geneva,sans-serif;color:#000;font-size:11px;overflow:hidden}

/* ── Toolbar rows ── */
.tb-menubar{background:#d4d0c8;border-bottom:1px solid #808080;padding:2px 4px;display:flex;align-items:center;gap:0;flex-shrink:0}
.tb-menubar a{padding:2px 8px;font-size:11px;color:#000;text-decoration:none;cursor:default;display:inline-block}
.tb-menubar a:hover{background:#000080;color:#fff}

.tb-patientbar{background:#c0bdb5;border-bottom:1px solid #808080;padding:3px 8px;display:flex;align-items:center;font-size:11px;flex-shrink:0;gap:0}
.tb-fields{display:flex;align-items:center;gap:16px;flex:1;flex-wrap:wrap}
.tb-field{display:flex;align-items:center;gap:4px}
.tb-field label{font-weight:700;font-size:10px;white-space:nowrap}
.tb-field span{background:#fff;border:1px inset #808080;min-width:80px;padding:1px 4px;font-size:10px;display:inline-block;color:#555}
.tb-btns{display:flex;gap:3px;flex-shrink:0}
.tb-btn{background:#d4d0c8;border:1px outset #dfdfdf;border-right-color:#404040;border-bottom-color:#404040;padding:1px 7px;font-size:10px;cursor:default;color:#000;font-family:Tahoma,sans-serif}
.tb-btn:active{border:1px inset #808080}

.tb-alertbar{background:#ffff00;border-bottom:1px solid #cccc00;padding:4px 12px;text-align:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0;letter-spacing:.03em}

.tb-tabbar{background:#d4d0c8;border-bottom:2px solid #808080;padding:2px 6px;display:flex;align-items:flex-end;gap:2px;flex-shrink:0}
.tb-tab{background:#c0bdb5;border:1px outset #dfdfdf;border-bottom:none;padding:2px 10px;font-size:10px;cursor:default;color:#000;font-family:Tahoma,sans-serif;position:relative;top:1px}
.tb-tab:hover{background:#d4d0c8}
.tb-tab.active{background:#f0f0f0;border-bottom:1px solid #f0f0f0;font-weight:700}

/* ── Existing styles ── */
.yellow-bar{background:#ffff00;padding:8px 12px;text-align:center;font-size:14px;font-weight:700;color:#000;border-bottom:1px solid #cccc00}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.window{background:#f0f0f0;border:2px outset #dfdfdf;width:100%;max-width:460px;box-shadow:1px 1px 0 #808080}
.window-title{background:linear-gradient(180deg,#0a246a,#3a6ea5);color:#fff;padding:3px 6px;font-size:11px;font-weight:700;display:flex;align-items:center}
.window-title-btns{margin-left:auto;display:flex;gap:2px}
.window-title-btns span{width:16px;height:14px;background:#d4d0c8;border:1px outset #dfdfdf;display:inline-block;text-align:center;line-height:12px;font-size:9px;cursor:default;color:#000}
.window-body{padding:16px 20px;background:#f0f0f0}
.center-panel{background:#c8b89a;border:2px inset #b0a080;padding:16px 20px;margin-bottom:16px}
.song-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#000;text-align:center;margin-bottom:12px}
.controls{display:flex;flex-direction:column;align-items:center;gap:10px}
.play-btn{width:64px;height:28px;background:#d4d0c8;border:2px outset #fff;border-right-color:#404040;border-bottom-color:#404040;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:Tahoma,sans-serif;font-size:10px;font-weight:700;color:#000;gap:4px}
.play-btn:active,.play-btn.playing{border:2px inset #fff;background:#c8c4bc}
.play-btn svg{width:10px;height:10px;fill:#000}
.progress-outer{width:100%;height:16px;background:#fff;border:2px inset #808080}
.progress-fill{height:100%;background:#000080;width:0%;transition:width .1s linear}
.time-row{width:100%;display:flex;justify-content:space-between;color:#444;font-family:'Courier New',monospace;font-size:10px;margin-top:2px}
.statusbar{background:#d4d0c8;border-top:1px solid #fff;padding:2px 6px;font-size:10px;color:#000;display:flex;flex-shrink:0}
.statusbar-cell{border:1px inset #d4d0c8;padding:1px 6px;flex:1}
.statusbar-cell.right{flex:none;width:120px;text-align:center}
</style>
</head>
<body>

<!-- Row 1: Menu bar -->
<div class="tb-menubar">
  <a href="#">Chart</a>
  <a href="#">Summary</a>
  <a href="#">Actions</a>
  <a href="#">Options</a>
  <a href="#">Resources</a>
  <a href="#">Help</a>
</div>

<!-- Row 2: Patient info bar -->
<div class="tb-patientbar">
  <div class="tb-fields">
    <div class="tb-field"><label>PROVIDER:</label><span>&nbsp;</span></div>
    <div class="tb-field"><label>LOCATION:</label><span>&nbsp;</span></div>
    <div class="tb-field"><label>DATE:</label><span id="tb-date">&nbsp;</span></div>
  </div>
  <div class="tb-btns">
    <button class="tb-btn">Query</button>
    <button class="tb-btn">Flag</button>
    <button class="tb-btn">Remote</button>
    <button class="tb-btn">Posts</button>
  </div>
</div>

<!-- Row 3: Alert banner -->
<div class="tb-alertbar">SIGN OUT STATUS: Not Completed</div>

<!-- Row 4: Tab/action row -->
<div class="tb-tabbar">
  <div class="tb-tab active">Active Orders</div>
  <div class="tb-tab">Summary</div>
  <div class="tb-tab">Notes</div>
  <div class="tb-tab">Labs</div>
  <div class="tb-tab">Reports</div>
</div>

<!-- Existing content -->
<div class="yellow-bar">Are you in a good place for sign out?</div>
<div class="main">
<div class="window">
<div class="window-title">
Sign Out Tool
<div class="window-title-btns"><span>_</span><span>&#x25a1;</span><span>&times;</span></div>
</div>
<div class="window-body">
<div class="center-panel">
<div class="song-label">Sign Out Song</div>
<div class="controls">
<button class="play-btn" id="playBtn" onclick="togglePlay()">
<svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
<span id="btnLabel">Play</span>
</button>
<div class="progress-outer">
<div class="progress-fill" id="progressBar"></div>
</div>
<div class="time-row">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>
</div>
</div>
</div>
</div>
</div>
<div class="statusbar">
<span class="statusbar-cell" id="status">Ready</span>
<span class="statusbar-cell right" id="clock"></span>
</div>
<audio id="audio" src="sign-out-song.mp3" preload="auto"></audio>
<script>
const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),playIcon=document.getElementById('playIcon'),btnLabel=document.getElementById('btnLabel'),progressBar=document.getElementById('progressBar'),currentTimeEl=document.getElementById('currentTime'),durationEl=document.getElementById('duration'),statusEl=document.getElementById('status'),clockEl=document.getElementById('clock');
const playSVG='<polygon points="6,3 20,12 6,21"/>',pauseSVG='<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';
function fmt(s){if(isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
function togglePlay(){if(audio.paused){audio.play();playIcon.innerHTML=pauseSVG;btnLabel.textContent='Pause';playBtn.classList.add('playing');statusEl.textContent='Playing: sign-out-song.mp3'}else{audio.pause();playIcon.innerHTML=playSVG;btnLabel.textContent='Play';playBtn.classList.remove('playing');statusEl.textContent='Paused'}}
audio.addEventListener('timeupdate',function(){progressBar.style.width=(audio.currentTime/audio.duration)*100+'%';currentTimeEl.textContent=fmt(audio.currentTime)});
audio.addEventListener('loadedmetadata',function(){durationEl.textContent=fmt(audio.duration)});
audio.addEventListener('ended',function(){playIcon.innerHTML=playSVG;btnLabel.textContent='Play';playBtn.classList.remove('playing');progressBar.style.width='0%';statusEl.textContent='Ready'});
function updateClock(){var d=new Date();clockEl.textContent=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(updateClock,1000);updateClock();
// Fill today's date in toolbar
(function(){var d=new Date();var el=document.getElementById('tb-date');if(el)el.textContent=d.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'})})();
</script>

<!-- Easter egg: hidden reflex hammer celebration -->
<style>
#easter-hover-zone{position:fixed;bottom:22px;right:0;width:220px;height:30px;z-index:9990;cursor:default;display:flex;align-items:center;justify-content:flex-end;padding-right:12px}
#easter-label{font-size:11px;color:#999;opacity:0;transition:opacity 0.4s ease;pointer-events:none;font-family:Tahoma,sans-serif;white-space:nowrap}
#easter-hover-zone:hover #easter-label{opacity:1}
#easter-hover-zone:hover{cursor:default}
#easter-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:bold;color:#fff;text-shadow:0 2px 8px #000,0 0 20px #000;z-index:10010;opacity:0;pointer-events:none;text-align:center;transition:opacity 0.5s ease}
</style>
<div id="easter-hover-zone" onclick="triggerHammers()" style="cursor:default"><div id="easter-label">Brought to you by the Neurology Class of 2029</div></div>
<div id="easter-msg">Nice catch, future neurologist! 🧠</div>
<script>
(function(){
  var images=['hammer.png','Image 1.png','Image 2.png','hammer_big.png'];
  function triggerHammers(){
    for(var i=0;i<25;i++){spawnHammer(i)}
    setTimeout(function(){
      var msg=document.getElementById('easter-msg');
      msg.style.opacity='1';
      setTimeout(function(){msg.style.opacity='0'},3000);
    },4200);
  }
  window.triggerHammers=triggerHammers;
  function spawnHammer(idx){
    var el=document.createElement('img');
    var src=images[Math.floor(Math.random()*images.length)];
    el.src=src;
    var size=60+Math.floor(Math.random()*61);
    el.style.cssText='position:fixed;width:'+size+'px;height:auto;z-index:10000;pointer-events:none;';
    var W=window.innerWidth,H=window.innerHeight;
    var edge=Math.floor(Math.random()*4);
    var startX,startY,endX,endY;
    if(edge===0){startX=Math.random()*W;startY=-size;endX=Math.random()*W;endY=H+size;}
    else if(edge===1){startX=Math.random()*W;startY=H+size;endX=Math.random()*W;endY=-size;}
    else if(edge===2){startX=-size;startY=Math.random()*H;endX=W+size;endY=Math.random()*H;}
    else{startX=W+size;startY=Math.random()*H;endX=-size;endY=Math.random()*H;}
    el.style.left=startX+'px';
    el.style.top=startY+'px';
    document.body.appendChild(el);
    var duration=1500+Math.random()*2000;
    var spinSpeed=200+Math.random()*600;
    var start=null;
    function animate(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/duration,1);
      var x=startX+(endX-startX)*p;
      var y=startY+(endY-startY)*p;
      var deg=(ts/spinSpeed*360)%360;
      var opacity=p>0.75?1-(p-0.75)/0.25:1;
      el.style.left=x+'px';
      el.style.top=y+'px';
      el.style.transform='rotate('+deg+'deg)';
      el.style.opacity=opacity;
      if(p<1){requestAnimationFrame(animate);}
      else{el.remove();}
    }
    setTimeout(function(){requestAnimationFrame(animate);},idx*30);
  }
})();
</script>
</body>
</html>
