<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Out Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;background:#d4d0c8;font-family:Tahoma,'MS Sans Serif',Geneva,sans-serif;color:#000;font-size:11px;overflow:hidden}
.yellow-bar{background:#ffff00;padding:8px 12px;text-align:center;font-size:14px;font-weight:700;color:#000;border-bottom:1px solid #cccc00}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.window{background:#f0f0f0;border:2px outset #dfdfdf;width:100%;max-width:460px;box-shadow:1px 1px 0 #808080}
.window-title{background:linear-gradient(180deg,#0a246a,#3a6ea5);color:#fff;padding:3px 6px;font-size:11px;font-weight:700;display:flex;align-items:center}
.window-title-btns{margin-left:auto;display:flex;gap:2px}
.window-title-btns span{width:16px;height:14px;background:#d4d0c8;border:1px outset #dfdfdf;display:inline-block;text-align:center;line-height:12px;font-size:9px;cursor:default;color:#000}
.window-body{padding:16px 20px;background:#f0f0f0}
.center-panel{background:#c8b89a;border:2px inset #b0a080;padding:16px 20px;margin-bottom:16px}
.song-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#000;text-align:center;margin-bottom:12px}
.controls{display:flex;flex-direction:column;align-items:center;gap:10px}
.play-btn{width:64px;height:28px;background:#d4d0c8;border:2px outset #fff;border-right-color:#404040;border-bottom-color:#404040;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:Tahoma,sans-serif;font-size:10px;font-weight:700;color:#000;gap:4px}
.play-btn:active,.play-btn.playing{border:2px inset #fff;background:#c8c4bc}
.play-btn svg{width:10px;height:10px;fill:#000}
.progress-outer{width:100%;height:16px;background:#fff;border:2px inset #808080}
.progress-fill{height:100%;background:#000080;width:0%;transition:width .1s linear}
.time-row{width:100%;display:flex;justify-content:space-between;color:#444;font-family:'Courier New',monospace;font-size:10px;margin-top:2px}
.statusbar{background:#d4d0c8;border-top:1px solid #fff;padding:2px 6px;font-size:10px;color:#000;display:flex}
.statusbar-cell{border:1px inset #d4d0c8;padding:1px 6px;flex:1}
.statusbar-cell.right{flex:none;width:120px;text-align:center}
</style>
</head>
<body>
<div class="yellow-bar">Are you in a good place for sign out?</div>
<div class="main">
<div class="window">
<div class="window-title">
Sign Out Tool
<div class="window-title-btns"><span>_</span><span>&#x25a1;</span><span>&times;</span></div>
</div>
<div class="window-body">
<div class="center-panel">
<div class="song-label">Sign Out Song</div>
<div class="controls">
<button class="play-btn" id="playBtn" onclick="togglePlay()">
<svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
<span id="btnLabel">Play</span>
</button>
<div class="progress-outer">
<div class="progress-fill" id="progressBar"></div>
</div>
<div class="time-row">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>
</div>
</div>
</div>
</div>
</div>
<div class="statusbar">
<span class="statusbar-cell" id="status">Ready</span>
<span class="statusbar-cell right" id="clock"></span>
</div>
<audio id="audio" src="sign-out-song.mp3" preload="auto"></audio>
<script>
const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),playIcon=document.getElementById('playIcon'),btnLabel=document.getElementById('btnLabel'),progressBar=document.getElementById('progressBar'),currentTimeEl=document.getElementById('currentTime'),durationEl=document.getElementById('duration'),statusEl=document.getElementById('status'),clockEl=document.getElementById('clock');
const playSVG='<polygon points="6,3 20,12 6,21"/>',pauseSVG='<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';
function fmt(s){if(isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
function togglePlay(){if(audio.paused){audio.play();playIcon.innerHTML=pauseSVG;btnLabel.textContent='Pause';playBtn.classList.add('playing');statusEl.textContent='Playing: sign-out-song.mp3'}else{audio.pause();playIcon.innerHTML=playSVG;btnLabel.textContent='Play';playBtn.classList.remove('playing');statusEl.textContent='Paused'}}
audio.addEventListener('timeupdate',function(){progressBar.style.width=(audio.currentTime/audio.duration)*100+'%';currentTimeEl.textContent=fmt(audio.currentTime)});
audio.addEventListener('loadedmetadata',function(){durationEl.textContent=fmt(audio.duration)});
audio.addEventListener('ended',function(){playIcon.innerHTML=playSVG;btnLabel.textContent='Play';playBtn.classList.remove('playing');progressBar.style.width='0%';statusEl.textContent='Ready'});
function updateClock(){var d=new Date();clockEl.textContent=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(updateClock,1000);updateClock();
</script>
</body>
</html>
