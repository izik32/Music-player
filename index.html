<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Out Song</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#c0c0c0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;color:#1a1a2e;overflow:hidden}.topbar{position:fixed;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#d4a017,#f0c040,#d4a017)}.container{background:#d4d0c8;border:2px solid #808080;border-top-color:#fff;border-left-color:#fff;box-shadow:inset 1px 1px 0 #dfdfdf,inset -1px -1px 0 #404040,4px 4px 12px rgba(0,0,0,.25);padding:48px 64px;text-align:center;max-width:520px;width:90%}.titlebar{background:linear-gradient(90deg,#00007b,#0855a5);color:#fff;font-size:13px;font-weight:600;padding:4px 8px;margin:-48px -64px 32px -64px;text-align:left}h1{font-size:28px;font-weight:700;color:#1a1a2e;line-height:1.3;margin-bottom:8px}.subtitle{font-size:16px;color:#d4a017;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:36px}.play-btn{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#d4a017,#f0c040);border:3px solid #b8860b;box-shadow:inset 0 2px 4px rgba(255,255,255,.4),0 4px 12px rgba(0,0,0,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;transition:all .15s ease}.play-btn:hover{background:linear-gradient(135deg,#e0b020,#f5d060);transform:scale(1.04)}.play-btn:active{transform:scale(.97)}.play-btn svg{width:40px;height:40px;fill:#1a1a2e;margin-left:4px}.play-btn.playing svg{margin-left:0}.progress-wrap{width:100%;height:6px;background:#a0a0a0;border:1px solid #808080;margin-bottom:8px;cursor:pointer}.progress-bar{height:100%;background:linear-gradient(90deg,#d4a017,#f0c040);width:0%;transition:width .1s linear}.time{font-size:12px;color:#606060;font-family:'Courier New',monospace;display:flex;justify-content:space-between}.statusbar{position:fixed;bottom:0;left:0;right:0;background:#d4d0c8;border-top:2px solid #fff;padding:3px 12px;font-size:11px;color:#404040}
</style>
</head>
<body>
<div class="topbar"></div>
<div class="container">
<div class="titlebar"><span>CPRS - Sign Out</span></div>
<h1>Are you in a good place<br>for sign out?</h1>
<div class="subtitle">Sign Out Song</div>
<button class="play-btn" id="playBtn" onclick="togglePlay()">
<svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
</button>
<div class="progress-wrap" onclick="seek(event)">
<div class="progress-bar" id="progressBar"></div>
</div>
<div class="time"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
</div>
<div class="statusbar"><span id="status">Ready</span></div>
<audio id="audio" src="sign-out-song.mp3" preload="auto"></audio>
<script>
const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),playIcon=document.getElementById('playIcon'),progressBar=document.getElementById('progressBar'),currentTimeEl=document.getElementById('currentTime'),durationEl=document.getElementById('duration'),statusEl=document.getElementById('status');const playSVG='<polygon points="6,3 20,12 6,21"/>',pauseSVG='<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';function fmt(s){if(isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}function togglePlay(){if(audio.paused){audio.play();playIcon.innerHTML=pauseSVG;playBtn.classList.add('playing');statusEl.textContent='Playing'}else{audio.pause();playIcon.innerHTML=playSVG;playBtn.classList.remove('playing');statusEl.textContent='Paused'}}audio.addEventListener('timeupdate',()=>{progressBar.style.width=(audio.currentTime/audio.duration)*100+'%';currentTimeEl.textContent=fmt(audio.currentTime)});audio.addEventListener('loadedmetadata',()=>{durationEl.textContent=fmt(audio.duration)});audio.addEventListener('ended',()=>{playIcon.innerHTML=playSVG;playBtn.classList.remove('playing');progressBar.style.width='0%';statusEl.textContent='Ready'});function seek(e){const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration}
</script>
</body>
</html>
